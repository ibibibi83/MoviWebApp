{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Users</h1>

    <ul class="user-grid">
        {% for user in users %}
        <li class="card">
            <h2>{{ user.name }}</h2>
            <a href="{{ url_for('get_user_movies', user_id=user.id) }}" class="button">
                View Movies
            </a>
        </li>
        {% endfor %}
    </ul>

    <div class="card">
        <h2>Add new User</h2>
        <form action="{{ url_for('post_user') }}" method="post">
            <input
                type="text"
                name="name"
                placeholder="Type name"
                required
            />
            <button type="submit" class="button">
                Save
            </button>
        </form>

    </div>
</div>
{% endblock %}
